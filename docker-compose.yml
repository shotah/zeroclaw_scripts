# Lean ZeroClaw stack — Gemini + Telegram (Telegram polls outbound).
# Gateway/dashboard published on 42617 for LAN access (keep off the public internet).
# Image: distroless upstream + gws + google-workspace-mcp-go + strava + garmin + gemini-search.
# Docs: docs/telegram.md, docs/google-workspace.md, docs/strava.md, docs/garmin.md, docs/web-search.md

services:
  zeroclaw:
    build:
      context: .
      # Defaults live once in the Dockerfile (ARG ...). Listing the names here
      # (no values) forwards an override from .env / the environment when set,
      # and otherwise falls back to the Dockerfile default.
      args:
        - ZEROCLAW_BASE
        - GWS_VERSION
        - STRAVA_MCP_VERSION
        - GARMIN_MCP_VERSION
        - GEMINI_SEARCH_MCP_REF
        - GOOGLE_WORKSPACE_MCP_REF
    image: ${ZEROCLAW_IMAGE:-zeroclaw-gws:local}
    container_name: zeroclaw
    restart: unless-stopped
    # Match the deploy user on the server (id -u / id -g). Avoids UID 65534 data fights.
    user: "${ZEROCLAW_UID:-1000}:${ZEROCLAW_GID:-1000}"
    # Writable CWD for leftover gws CLI deletes (docs/google-workspace.md).
    working_dir: /zeroclaw-scratch
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /zeroclaw-data
      ZEROCLAW_DATA_DIR: /zeroclaw-data/data
      # Container clock defaults to UTC without this — cron + "what time is it" go wrong.
      TZ: ${TZ:-America/Los_Angeles}
      ZEROCLAW_providers__models__gemini__default__api_key: ${GEMINI_API_KEY:-}
      ZEROCLAW_providers__models__gemini__default__model: ${GEMINI_MODEL:-gemini-3.5-flash}
      ZEROCLAW_channels__telegram__default__bot_token: ${TELEGRAM_BOT_TOKEN:-}
      ZEROCLAW_channels__telegram__default__enabled: "true"
      ZEROCLAW_gateway__host: "0.0.0.0"
      ZEROCLAW_gateway__port: "42617"
      ZEROCLAW_gateway__allow_public_bind: "true"
      # Gemini Google Search MCP (zchee) inherits these — same key as chat.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      # OpenAI-compatible client for ZeroClaw hybrid memory embeddings
      # (Gemini embeddings endpoint in config.toml). Same key as chat.
      OPENAI_API_KEY: ${GEMINI_API_KEY:-}
      # Google Workspace MCP (magks) — OAuth client + token dir (docs/google-workspace.md).
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      USER_GOOGLE_EMAIL: ${USER_GOOGLE_EMAIL:-}
      WORKSPACE_MCP_CREDENTIALS_DIR: /zeroclaw-data/.config/google-mcp/credentials
      # Optional legacy gws CLI (docker exec). Prefer the MCP for Tim.
      GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND: file
      GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE: /zeroclaw-data/.config/gws/credentials.json
      # Strava MCP subprocess inherits these (see docs/strava.md). Token persists on the mount.
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_TOKEN_PATH: /zeroclaw-data/.config/strava/tokens.json
      # Garmin MCP: no email/password env — session.json on the mount (docs/garmin.md).
    ports:
      # Web dashboard + REST/WS gateway — LAN only; do not port-forward from the WAN.
      - "${GATEWAY_PORT:-42617}:42617"
    volumes:
      # Full .zeroclaw dir (config.toml + pairing/agent state) — owned by deploy user
      - ./config:/zeroclaw-data/.zeroclaw
      # Workspace / memory
      - ./data:/zeroclaw-data/data
      # Google Workspace MCP OAuth tokens (gitignored). Import via make google-mcp-import.
      - ./secrets/google-mcp:/zeroclaw-data/.config/google-mcp
      # Optional legacy gws CLI export (gitignored).
      - ./secrets/google/credentials.json:/zeroclaw-data/.config/gws/credentials.json:ro
      - ./secrets/google/client_secret.json:/zeroclaw-data/.config/gws/client_secret.json:ro
      # Strava OAuth token (gitignored). Create via docs/strava.md
      - ./secrets/strava:/zeroclaw-data/.config/strava
      # Garmin Connect session (gitignored). Create via docs/garmin.md / make garmin-auth
      - ./secrets/garmin:/zeroclaw-data/.config/garmin
    tmpfs:
      - /zeroclaw-scratch:mode=1777
      - /zeroclaw-data/.config/gws:uid=${ZEROCLAW_UID:-1000},gid=${ZEROCLAW_GID:-1000},mode=0700
    mem_limit: 2g
    cpus: 4.0
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "zeroclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
