# Lean ZeroClaw stack — Gemini + Telegram, no host ports (Telegram polls).
# Image: distroless upstream + gws + strava-mcp + garmin + gemini-search (see Dockerfile).
# Docs: docs/telegram.md, docs/google-workspace.md, docs/strava.md, docs/garmin.md, docs/web-search.md

services:
  zeroclaw:
    build:
      context: .
      # Defaults live once in the Dockerfile (ARG ...). Listing the names here
      # (no values) forwards an override from .env / the environment when set,
      # and otherwise falls back to the Dockerfile default.
      args:
        - ZEROCLAW_BASE
        - GWS_VERSION
        - STRAVA_MCP_VERSION
        - GARMIN_MCP_REF
        - GEMINI_SEARCH_MCP_REF
    image: ${ZEROCLAW_IMAGE:-zeroclaw-gws:local}
    container_name: zeroclaw
    restart: unless-stopped
    # Match the deploy user on the server (id -u / id -g). Avoids UID 65534 data fights.
    user: "${ZEROCLAW_UID:-1000}:${ZEROCLAW_GID:-1000}"
    # Run from a writable scratch dir. gws writes the empty 204 body of a *delete*
    # (e.g. `calendar events delete`) to a file in its CWD; the image WORKDIR and the
    # bind mounts aren't writable by this uid, so that fails with "os error 13
    # Permission denied" and the delete never lands. A world-writable tmpfs (below)
    # gives gws somewhere to write, so deletes succeed. See docs/google-workspace.md.
    working_dir: /zeroclaw-scratch
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /zeroclaw-data
      ZEROCLAW_DATA_DIR: /zeroclaw-data/data
      ZEROCLAW_providers__models__gemini__default__api_key: ${GEMINI_API_KEY:-}
      ZEROCLAW_providers__models__gemini__default__model: ${GEMINI_MODEL:-gemini-3.5-flash}
      ZEROCLAW_channels__telegram__default__bot_token: ${TELEGRAM_BOT_TOKEN:-}
      ZEROCLAW_channels__telegram__default__enabled: "true"
      ZEROCLAW_gateway__host: "127.0.0.1"
      ZEROCLAW_gateway__port: "42617"
      ZEROCLAW_gateway__allow_public_bind: "false"
      # Gemini Google Search MCP (zchee) inherits these — same key as chat.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      # gws in Docker: file keyring + exported OAuth creds (see docs/google-workspace.md)
      GOOGLE_WORKSPACE_CLI_KEYRING_BACKEND: file
      GOOGLE_WORKSPACE_CLI_CONFIG_DIR: /zeroclaw-data/.config/gws
      GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE: /zeroclaw-data/.config/gws/credentials.json
      # Strava MCP subprocess inherits these (see docs/strava.md). Token persists on the mount.
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_TOKEN_PATH: /zeroclaw-data/.config/strava/tokens.json
      # Garmin MCP: no email/password env — session.json on the mount (docs/garmin.md).
    volumes:
      # Full .zeroclaw dir (config.toml + pairing/agent state) — owned by deploy user
      - ./config:/zeroclaw-data/.zeroclaw
      # Workspace / memory
      - ./data:/zeroclaw-data/data
      # Google OAuth export (gitignored). Create via docs/google-workspace.md
      - ./secrets/google:/zeroclaw-data/.config/gws
      # Strava OAuth token (gitignored). Create via docs/strava.md
      - ./secrets/strava:/zeroclaw-data/.config/strava
      # Garmin Connect session (gitignored). Create via docs/garmin.md / make garmin-auth
      - ./secrets/garmin:/zeroclaw-data/.config/garmin
    # Ephemeral, world-writable scratch for gws output files (see working_dir above).
    tmpfs:
      - /zeroclaw-scratch:mode=1777
    mem_limit: 512m
    cpus: 2.0
    mem_reservation: 32m
    healthcheck:
      test: ["CMD", "zeroclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
