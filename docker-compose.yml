# Lean ZeroClaw stack — Gemini + Telegram, no host ports (Telegram polls).
# Docs: https://github.com/zeroclaw-labs/zeroclaw/blob/master/docs/book/src/setup/container.md

services:
  zeroclaw:
    image: ${ZEROCLAW_IMAGE:-ghcr.io/zeroclaw-labs/zeroclaw:latest}
    container_name: zeroclaw
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /zeroclaw-data
      ZEROCLAW_DATA_DIR: /zeroclaw-data/data
      # Schema-mirror overrides (secrets stay in .env, not baked into image)
      ZEROCLAW_providers__models__gemini__default__api_key: ${GEMINI_API_KEY:-}
      ZEROCLAW_providers__models__gemini__default__model: ${GEMINI_MODEL:-gemini-2.5-flash}
      ZEROCLAW_channels__telegram__default__bot_token: ${TELEGRAM_BOT_TOKEN:-}
      ZEROCLAW_channels__telegram__default__enabled: "true"
      # Gateway stays internal — do not publish ports for Telegram-only
      ZEROCLAW_gateway__host: "127.0.0.1"
      ZEROCLAW_gateway__port: "42617"
      ZEROCLAW_gateway__allow_public_bind: "false"
    volumes:
      - ./data:/zeroclaw-data
    # No ports: — Telegram long-polls outbound; no inbound webhook needed.
    mem_limit: 512m
    cpus: 2.0
    mem_reservation: 32m
    healthcheck:
      test: ["CMD", "zeroclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
